server {
    listen 80;
    server_name _;
    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name _;
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 10m;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # Browser authentication is handled by the Next.js BFF so JWT and
    # refresh tokens remain in httpOnly cookies. Preserve /api/auth/*.
    location /api/auth/ { proxy_pass http://web:3000; }

    # Authenticated application API requests must pass through the Next.js
    # BFF. The BFF reads the httpOnly access-token cookie and creates the
    # Authorization header; browsers never call ASP.NET directly.
    location /api/backend/ { proxy_pass http://web:3000; }
    location /health/ { proxy_pass http://api:8080/health/; }
    location / { proxy_pass http://web:3000; }
}
