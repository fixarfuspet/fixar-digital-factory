services:
  postgres:
    image: postgres:16-alpine
    container_name: fixar-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fixar_os}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - fixar-os-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-fixar_os}"]
      interval: 10s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:latest
    container_name: fixar-os-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - fixar-os-seq-data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fixar-os-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-fixar_os};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET is required}
      Jwt__Issuer: ${JWT_ISSUER:-FixarOS}
      Jwt__Audience: ${JWT_AUDIENCE:-FixarOSClients}
      Cors__AllowedOrigins__0: ${CORS_ALLOWED_ORIGIN:-http://localhost:3000}
      Serilog__WriteTo__2__Name: Seq
      Serilog__WriteTo__2__Args__serverUrl: "http://seq:5341"
    ports:
      - "8080:8080"

volumes:
  fixar-os-postgres-data:
  fixar-os-seq-data:
